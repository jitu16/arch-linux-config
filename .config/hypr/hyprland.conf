################
### MONITORS ###
################

# HDMI-A-1 at 1440p 60Hz, eDP-1 (Laptop) to its right
monitor= HDMI-A-1, 2560x1440@60, 0x0, 1
monitor= eDP-1, 1366x768@60, 2560x0, 1

###################
### MY PROGRAMS ###
###################

$terminal = alacritty
$fileManager = dolphin
$menu = wofi --show drun

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = mako
exec-once = kdeconnectd
exec-once = playerctld daemon
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user import-environment WAYLAND_DISPLAY
exec-once = awww-daemon
exec-once = sleep 0.5 && ~/.config/hypr/scripts/wallpaper.zsh
exec-once = hypridle
exec-once = emacs --daemon

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_MENU_PREFIX,arch-

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 2
    gaps_out = 2
    border_size = 0
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}



dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

# gestures {
#     workspace_swipe = true
# }

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Basics (Synced with Sway Muscle Memory)
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, E, exec, hyprctl dispatch exit
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod, P, pseudo,
bind = $mainMod, backslash, togglesplit,
bind = $mainMod, G, exec, $fileManager
bind = $mainMod, E, exec, emacsclient -c -a 'emacs'

# Movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
#
# Move the active window (Swap) with mainMod + SHIFT + hjkl
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize windows with mainMod + CTRL + hjkl
# binde = 'e' for repeat (holding the key keeps resizing)
binde = $mainMod CONTROL, l, resizeactive, 30 0
binde = $mainMod CONTROL, h, resizeactive, -30 0
binde = $mainMod CONTROL, k, resizeactive, 0 -30
binde = $mainMod CONTROL, j, resizeactive, 0 30
binde = $mainMod CONTROL, right, resizeactive, 30 0
binde = $mainMod CONTROL, left, resizeactive, -30 0
binde = $mainMod CONTROL, up, resizeactive, 0 -30
binde = $mainMod CONTROL, down, resizeactive, 0 30

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Custom Fast Travel (Super + Ctrl + L/H)
# bind = $mainMod CONTROL, L, workspace, e+1
# bind = $mainMod CONTROL, H, workspace, e-1

# Media Keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPrev, exec, playerctl previous
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bind = $mainMod, XF86AudioNext, exec, playerctl position 5+
bind = $mainMod, XF86AudioPrev, exec, playerctl position 5-

# Wallpaper
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper.zsh

# Lock Screen
bind = $mainMod, T, exec, ~/.config/hypr/scripts/lock.zsh

# Toggle Idle
bind = $mainMod SHIFT, I, exec, ~/.config/hypr/scripts/idle.zsh

# ==============================================================================
# MONITOR CONTROL CENTER (Super + M)
# ==============================================================================
# This enters the 'monitor' submap. While in this mode, other keys won't work
# until you press 1, 2, 9, 0, or Escape.
bind = $mainMod, M, submap, monitor

submap = monitor

# [1] Portrait: Forces HDMI to 0x0 and Laptop to 1440x0 (Width of portrait 1440p)
bind = , 1, exec, hyprctl keyword monitor "HDMI-A-1, 2560x1440@60, 0x0, 1, transform, 1" && hyprctl keyword monitor "eDP-1, 1366x768@60, 2560x0, 1"
bind = , 1, submap, reset

# [2] Landscape: Forces HDMI to 0x0 and Laptop to 2560x0
bind = , 2, exec, hyprctl keyword monitor "HDMI-A-1, 2560x1440@60, 0x0, 1, transform, 0" && hyprctl keyword monitor "eDP-1, 1366x768@60, 2560x0, 1"
bind = , 2, submap, reset

# [9] Dual Screen: Explicitly set both positions
bind = , 9, exec, hyprctl keyword monitor "HDMI-A-1, 2560x1440@60, 0x0, 1" && hyprctl keyword monitor "eDP-1, 1366x768@60, 2560x0, 1"
bind = , 9, submap, reset

# [0] Clamshell
bind = , 0, exec, hyprctl keyword monitor "eDP-1, disable"
bind = , 0, submap, reset

submap = reset

# ==============================================================================
# LID SWITCH
# ==============================================================================
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 1366x768@60, 2560x0, 1"

##############################
### WINDOWS AND WORKSPACES ###
##############################

# 1. Default Opacity (0.90 for everything)
windowrule {
    name = universal-opacity
    match:class = .*
    opacity = 0.90 0.90
}

windowrule {
    name = firefox-opacity
    match:class = firefox
    opacity = 1.0 1.0
}

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

workspace = 1, monitor:HDMI-A-1, default:true

workspace = 2, monitor:eDP-1, default:true
